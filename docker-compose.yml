# OpsMind v2 — 运维数字员工系统 Docker Compose 编排
#
# v2 架构：移除 AnythingLLM + vLLM，自建 Go RAG 引擎 + pgvector 向量存储。
# 4 个必须服务：opsmind-server, opsmind-web, postgres(pgvector), minio
# 1 个可选服务：llama-cpp (profile: ai-local)
#
# 使用方式：
#   docker compose up -d --build              # 一键启动 4 个必须服务
#   docker compose --profile ai-local up -d --build  # 含 llama.cpp 完整环境
#   docker compose down                       # 停止
#   docker compose down -v                    # 停止并清除数据卷

services:
  # ===== OpsMind Go 后端 =====
  opsmind-server:
    build:
      context: ./server
    container_name: opsmind-server
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      OPSMIND_SERVER_PORT: 8080
      OPSMIND_DATABASE_HOST: postgres
      OPSMIND_DATABASE_PORT: 5432
      OPSMIND_DATABASE_USER: opsmind
      OPSMIND_DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-opsmind_dev}
      OPSMIND_DATABASE_DBNAME: opsmind
      OPSMIND_MINIO_ENDPOINT: minio:9000
      OPSMIND_JWT_SECRET: ${JWT_SECRET}
      # v2: LLM/Embedding 配置（直接调用 llama.cpp 或 OpenAI-compatible API）
      OPSMIND_LLM_BASE_URL: ${LLM_BASE_URL:-http://llama-cpp:8080/v1}
      OPSMIND_LLM_API_KEY: ${LLM_API_KEY:-}
      OPSMIND_LLM_MODEL: ${LLM_MODEL:-qwen3-4b}
      OPSMIND_LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-8192}
      OPSMIND_EMBEDDING_MODEL: ${EMBEDDING_MODEL:-bge-m3}
      OPSMIND_EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-1024}
      OPSMIND_AI_DEFAULT_TOP_K: ${AI_DEFAULT_TOP_K:-5}
      OPSMIND_AI_CONFIDENCE_THRESHOLD: ${AI_CONFIDENCE_THRESHOLD:-0.6}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - opsmind

  # ===== OpsMind Vue 前端 =====
  opsmind-web:
    build:
      context: ./web
    container_name: opsmind-web
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - opsmind-server
    networks:
      - opsmind

  # ===== PostgreSQL + pgvector =====
  postgres:
    image: pgvector/pgvector:pg18
    container_name: opsmind-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: opsmind
      POSTGRES_USER: opsmind
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-opsmind_dev}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opsmind"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - opsmind

  # ===== MinIO 对象存储 =====
  minio:
    image: minio/minio:latest
    container_name: opsmind-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - opsmind

  # ===== llama.cpp Server（可选，profile: ai-local）=====
  # 使用官方镜像，模型文件通过 volume 挂载。
  # 模型准备：下载 .gguf 模型文件到 ./models 目录。
  llama-cpp:
    image: ghcr.io/ggerganov/llama.cpp:server
    container_name: opsmind-llama-cpp
    restart: unless-stopped
    ports:
      - "8081:8080"
    volumes:
      - ${LLAMA_MODELS_DIR:-./models}:/models:ro
    command:
      - "--model"
      - "/models/${LLM_MODEL:-qwen3-4b}.gguf"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8080"
    networks:
      - opsmind
    profiles:
      - ai-local

# ===== 数据卷 =====
volumes:
  postgres_data:
  minio_data:

# ===== 网络 =====
networks:
  opsmind:
    driver: bridge
